<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OceanSwarm</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --panel:    #161b27;
      --border:   #252d40;
      --accent:   #6366f1;
      --accent2:  #818cf8;
      --text:     #e2e8f0;
      --dim:      #64748b;
      --green:    #4ade80;
      --yellow:   #facc15;
      --red:      #f87171;
      --dead:     #374151;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent2);
      letter-spacing: 0.05em;
    }
    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--dim);
    }
    .dot.running { background: var(--green); box-shadow: 0 0 6px var(--green); }
    #tick-display { color: var(--dim); margin-left: auto; font-size: 12px; }

    /* ── Main layout ── */
    main {
      display: grid;
      grid-template-columns: 220px 1fr 260px;
      flex: 1;
      overflow: hidden;
    }

    /* ── Panels ── */
    .panel {
      background: var(--panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .panel:last-child { border-right: none; border-left: 1px solid var(--border); }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 6px;
    }

    /* ── Buttons ── */
    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: default; }

    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-secondary { background: #1e293b; color: var(--text); border: 1px solid var(--border); }
    .btn-danger    { background: #3f1d1d; color: var(--red); border: 1px solid #5c2626; }
    .btn-sm        { padding: 3px 8px; font-size: 11px; }

    .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }

    /* ── Forms ── */
    label {
      display: block;
      font-size: 11px;
      color: var(--dim);
      margin-bottom: 3px;
    }
    input, textarea, select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      padding: 5px 8px;
      font-size: 12px;
      margin-bottom: 8px;
      outline: none;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
    }
    textarea { resize: vertical; min-height: 48px; }

    /* ── Event chips ── */
    .event-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #1e293b;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 11px;
      margin: 2px;
    }
    .event-chip .remove {
      background: none; border: none; color: var(--dim);
      cursor: pointer; font-size: 13px; padding: 0; line-height: 1;
    }
    .event-chip .remove:hover { color: var(--red); }

    .predefined-btn {
      background: #1e293b;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 5px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      margin: 2px;
    }
    .predefined-btn:hover { border-color: var(--accent); color: var(--accent2); }

    /* ── Canvas area ── */
    #world-wrap {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }
    #tooltip {
      position: absolute;
      background: rgba(15,17,23,0.95);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 10px;
      font-size: 11px;
      line-height: 1.6;
      pointer-events: none;
      display: none;
      z-index: 10;
      max-width: 160px;
    }
    #tooltip .t-name { font-weight: 700; margin-bottom: 2px; }

    /* ── Zoom controls ── */
    #zoom-controls {
      position: absolute;
      bottom: 12px;
      right: 12px;
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(22, 27, 39, 0.9);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 8px;
      z-index: 10;
      backdrop-filter: blur(4px);
    }
    #zoom-controls button {
      background: #1e293b;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 2px 8px;
      font-size: 14px;
      line-height: 1.4;
      border-radius: 4px;
    }
    #zoom-controls button:hover { border-color: var(--accent); color: var(--accent2); }
    #zoom-pct {
      font-size: 11px;
      color: var(--dim);
      min-width: 38px;
      text-align: center;
    }

    /* ── Map hint ── */
    #map-hint {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: var(--dim);
      background: rgba(22,27,39,0.75);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1s;
    }

    /* ── Agent list ── */
    .agent-item {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      margin-bottom: 6px;
      background: var(--bg);
    }
    .agent-item.dead { opacity: 0.4; }
    .agent-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }
    .agent-name-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .agent-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .agent-name { font-weight: 600; font-size: 12px; }
    .agent-pos  { color: var(--dim); font-size: 10px; }
    .energy-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .energy-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s;
    }
    .agent-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      color: var(--dim);
      font-size: 10px;
    }
    .badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
    }
    .badge-alive  { background: #14532d; color: var(--green); }
    .badge-dead   { background: #3f1d1d; color: var(--red); }

    /* ── Activity log ── */
    #log {
      flex: 1;
      overflow-y: auto;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 10px;
      line-height: 1.7;
      color: var(--dim);
      min-height: 0;
    }
    #log .log-entry { border-bottom: 1px solid #1a1d26; padding-bottom: 6px; margin-bottom: 6px; }
    #log .log-tick  { color: var(--accent2); font-weight: 700; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Empty state ── */
    .empty { color: var(--dim); font-size: 11px; padding: 8px 0; text-align: center; }

    /* ── Agent detail card ── */
    #agent-detail-wrap { margin-bottom: 10px; }
    #agent-detail {
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: 7px;
      padding: 10px;
      font-size: 11px;
      line-height: 1.8;
    }
    #agent-detail .d-name {
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 6px;
    }
    #agent-detail .d-row {
      display: flex;
      justify-content: space-between;
      color: var(--dim);
    }
    #agent-detail .d-row span:last-child { color: var(--text); }
    #agent-detail .d-desc {
      margin-top: 6px;
      color: var(--dim);
      font-style: italic;
      font-size: 10px;
      border-top: 1px solid var(--border);
      padding-top: 5px;
    }
  </style>
</head>
<body>

<header>
  <h1>⬡ OceanSwarm</h1>
  <div class="status-pill">
    <span class="dot" id="status-dot"></span>
    <span id="status-text">Stopped</span>
  </div>
  <div class="status-pill">
    <span style="color:var(--dim)">Tick</span>
    <span id="tick-num" style="font-weight:700">0</span>
  </div>
  <div class="status-pill">
    <span id="agent-count" style="font-weight:700">0</span>
    <span style="color:var(--dim)">agents alive</span>
  </div>
</header>

<main>

  <!-- LEFT PANEL -->
  <div class="panel">

    <div>
      <div class="section-title">Simulation</div>
      <div class="btn-row" style="margin-bottom:8px">
        <button class="btn-primary" id="btn-start">▶ Start</button>
        <button class="btn-secondary" id="btn-stop">■ Stop</button>
        <button class="btn-secondary" id="btn-tick">⚡ Tick</button>
      </div>
      <label>Auto-tick interval (seconds)
        <input type="number" id="interval-input" value="30" min="5" max="300" />
      </label>
    </div>

    <hr style="border-color:var(--border)" />

    <div>
      <div class="section-title">Spawn Agent</div>
      <label>Name<input type="text" id="new-name" placeholder="e.g. Mira" /></label>
      <label>Age<input type="number" id="new-age" value="25" min="1" max="99" /></label>
      <label>Gender
        <select id="new-gender">
          <option>unknown</option>
          <option>female</option>
          <option>male</option>
          <option>non-binary</option>
        </select>
      </label>
      <label>Personality
        <textarea id="new-personality" placeholder="e.g. Curious and friendly explorer..."></textarea>
      </label>
      <button class="btn-primary" id="btn-create" style="width:100%">+ Spawn</button>
      <div id="spawn-status" style="margin-top:6px;font-size:11px;min-height:16px"></div>
    </div>

    <hr style="border-color:var(--border)" />

    <div>
      <div class="section-title">World Events</div>
      <div id="active-events" style="margin-bottom:8px"></div>
      <div id="predefined-events"></div>
    </div>

  </div>

  <!-- CENTER: CANVAS -->
  <div id="world-wrap">
    <canvas id="canvas"></canvas>
    <div id="tooltip"></div>
    <div id="map-hint">scroll to zoom · drag to pan</div>
    <div id="zoom-controls">
      <button id="btn-zoom-in"  title="Zoom in">+</button>
      <button id="btn-zoom-out" title="Zoom out">−</button>
      <button id="btn-zoom-reset" title="Reset view">⊙</button>
      <span id="zoom-pct">100%</span>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel" style="border-left:1px solid var(--border)">

    <div id="agent-detail-wrap" style="flex-shrink:0;display:none">
      <div class="section-title">Selected Agent</div>
      <div id="agent-detail"></div>
    </div>

    <div style="flex-shrink:0">
      <div class="section-title">Agents</div>
      <div id="agent-list"></div>
    </div>

    <div style="display:flex;flex-direction:column;flex:1;min-height:120px">
      <div class="section-title">Activity Log</div>
      <div id="log"></div>
    </div>

  </div>

</main>

<script>
  const API    = '';
  const WS_URL = `ws://${location.host}/ws`;

  const CELL = 5;
  const GRID = 100;

  let agents    = [];
  let simStatus = { current_tick: 0, is_running: false, tick_interval_seconds: 30 };
  let predefined = {};
  let hoveredAgent  = null;
  let selectedAgent = null;

  // ── Per-agent color ────────────────────────────────────────────
  // Deterministic hue from agent UUID so color survives page reloads
  function agentHue(id) {
    let h = 0;
    for (let i = 0; i < id.length; i++) {
      h = Math.imul(h * 31 + id.charCodeAt(i), 1) | 0;
    }
    return Math.abs(h) % 360;
  }

  function agentColor(id, alive) {
    if (!alive) return '#374151';
    return `hsl(${agentHue(id)}, 75%, 62%)`;
  }

  function energyColor(energy, alive) {
    if (!alive) return '#374151';
    if (energy > 60) return '#4ade80';
    if (energy > 30) return '#facc15';
    return '#f87171';
  }

  // ── Canvas & view state ───────────────────────────────────────
  const wrap   = document.getElementById('world-wrap');
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');

  let canvasW = 0;
  let canvasH = 0;

  // view: world→screen  screenX = worldX * scale + offsetX
  let view = { x: 0, y: 0, scale: 1 };

  function initView(w, h) {
    const worldPx = GRID * CELL;
    const fit = Math.min(w / worldPx, h / worldPx) * 0.9;
    view.scale = fit;
    view.x = (w - worldPx * fit) / 2;
    view.y = (h - worldPx * fit) / 2;
  }

  function syncCanvasSize() {
    const { width, height } = wrap.getBoundingClientRect();
    if (width === canvasW && height === canvasH) return;
    const wasEmpty = canvasW === 0;
    canvasW = width;
    canvasH = height;
    canvas.width  = width;
    canvas.height = height;
    if (wasEmpty) initView(width, height);
    drawCanvas();
  }

  new ResizeObserver(syncCanvasSize).observe(wrap);

  // ── Zoom helpers ──────────────────────────────────────────────
  const MIN_SCALE = 0.2;
  const MAX_SCALE = 20;

  function zoomAround(factor, cx, cy) {
    const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, view.scale * factor));
    const actual   = newScale / view.scale;
    view.x = cx - (cx - view.x) * actual;
    view.y = cy - (cy - view.y) * actual;
    view.scale = newScale;
    updateZoomDisplay();
    drawCanvas();
  }

  function zoomBy(factor) {
    zoomAround(factor, canvasW / 2, canvasH / 2);
  }

  function resetView() {
    initView(canvasW, canvasH);
    updateZoomDisplay();
    drawCanvas();
  }

  function updateZoomDisplay() {
    document.getElementById('zoom-pct').textContent = Math.round(view.scale * 100) + '%';
  }

  // ── Canvas drawing ────────────────────────────────────────────
  function drawCanvas() {
    const W = canvas.width;
    const H = canvas.height;

    // Reset transform then clear
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, W, H);

    // Full-screen background
    ctx.fillStyle = '#0b0e17';
    ctx.fillRect(0, 0, W, H);

    // Apply world transform
    ctx.save();
    ctx.translate(view.x, view.y);
    ctx.scale(view.scale, view.scale);

    const worldW = GRID * CELL;
    const worldH = GRID * CELL;

    // World background
    ctx.fillStyle = '#0d1020';
    ctx.fillRect(0, 0, worldW, worldH);

    // Grid lines (thin, adapt to zoom)
    const lineW = Math.max(0.3, 0.5 / view.scale);
    ctx.strokeStyle = '#1a1d26';
    ctx.lineWidth   = lineW;
    for (let i = 0; i <= GRID; i += 10) {
      ctx.beginPath();
      ctx.moveTo(i * CELL, 0);      ctx.lineTo(i * CELL, worldH);
      ctx.moveTo(0, i * CELL);      ctx.lineTo(worldW,   i * CELL);
      ctx.stroke();
    }

    // World border
    ctx.strokeStyle = '#252d40';
    ctx.lineWidth   = Math.max(0.5, 1 / view.scale);
    ctx.strokeRect(0, 0, worldW, worldH);

    // Interaction radius ring for hovered agent
    if (hoveredAgent) {
      const cx = hoveredAgent.x * CELL + CELL / 2;
      const cy = hoveredAgent.y * CELL + CELL / 2;
      ctx.beginPath();
      ctx.arc(cx, cy, 5 * CELL, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(99,102,241,0.35)';
      ctx.lineWidth   = Math.max(0.5, 1 / view.scale);
      ctx.stroke();
    }

    // Agents
    for (const a of agents) {
      const px    = a.x * CELL + CELL / 2;
      const py    = a.y * CELL + CELL / 2;
      const r     = a.is_alive ? 3.5 : 2;
      const color = agentColor(a.id, a.is_alive);

      // Main dot — unique agent color
      ctx.beginPath();
      ctx.arc(px, py, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();

      // Selected highlight (solid white ring)
      if (selectedAgent && selectedAgent.id === a.id) {
        ctx.beginPath();
        ctx.arc(px, py, r + 5, 0, Math.PI * 2);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth   = Math.max(0.8, 2 / view.scale);
        ctx.stroke();
      }

      // Hover highlight
      if (hoveredAgent && hoveredAgent.id === a.id) {
        ctx.beginPath();
        ctx.arc(px, py, r + 3.5, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth   = Math.max(0.5, 1.5 / view.scale);
        ctx.stroke();
      }
    }

    ctx.restore();
  }

  // ── Mouse: hover / tooltip ────────────────────────────────────
  // Find closest agent to a screen coordinate within maxPx screen pixels
  function agentAtScreen(sx, sy, maxPx = 14) {
    let best = null, bestDist = maxPx;
    for (const a of agents) {
      const wx = a.x * CELL + CELL / 2;
      const wy = a.y * CELL + CELL / 2;
      const screenX = wx * view.scale + view.x;
      const screenY = wy * view.scale + view.y;
      const d = Math.hypot(sx - screenX, sy - screenY);
      if (d < bestDist) { bestDist = d; best = a; }
    }
    return best;
  }

  canvas.addEventListener('mousemove', e => {
    if (isDragging) return;

    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;

    hoveredAgent = agentAtScreen(sx, sy);

    canvas.style.cursor = hoveredAgent ? 'crosshair' : 'grab';

    const tip = document.getElementById('tooltip');
    if (hoveredAgent) {
      const a    = hoveredAgent;
      const mood = a.internal_state?.mood || '—';
      const goal = a.internal_state?.goal || '—';
      const inv  = Object.entries(a.inventory || {}).map(([k,v]) => `${k}:${v}`).join(', ') || 'empty';
      const col  = agentColor(a.id, a.is_alive);
      tip.innerHTML = `
        <div class="t-name" style="color:${col}">${a.name}</div>
        <div>⚡ ${a.energy.toFixed(1)} / 100</div>
        <div>📍 (${a.x}, ${a.y})</div>
        <div>😐 ${mood}</div>
        <div>🎯 ${goal}</div>
        <div>🎒 ${inv}</div>
        ${!a.is_alive ? '<div style="color:var(--red)">✝ Dead</div>' : ''}
      `;
      tip.style.display = 'block';
      const wrapRect = wrap.getBoundingClientRect();
      let tx = e.clientX - wrapRect.left + 14;
      let ty = e.clientY - wrapRect.top  - 10;
      if (tx + 160 > wrapRect.width)  tx -= 180;
      if (ty + 140 > wrapRect.height) ty -= 150;
      tip.style.left = tx + 'px';
      tip.style.top  = ty + 'px';
    } else {
      tip.style.display = 'none';
    }

    drawCanvas();
  });

  canvas.addEventListener('mouseleave', () => {
    if (!isDragging) {
      hoveredAgent = null;
      document.getElementById('tooltip').style.display = 'none';
      canvas.style.cursor = 'crosshair';
      drawCanvas();
    }
  });

  // ── Mouse: pan ────────────────────────────────────────────────
  let isDragging  = false;
  let hasDragged  = false;
  let dragStart   = { x: 0, y: 0 };
  let viewAtDrag  = { x: 0, y: 0 };

  canvas.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    isDragging = true;
    hasDragged = false;
    dragStart  = { x: e.clientX, y: e.clientY };
    viewAtDrag = { x: view.x, y: view.y };
    canvas.style.cursor = 'grabbing';
  });

  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    if (!hasDragged && Math.hypot(dx, dy) > 8) {
      hasDragged = true;
      document.getElementById('tooltip').style.display = 'none';
    }
    if (hasDragged) {
      view.x = viewAtDrag.x + dx;
      view.y = viewAtDrag.y + dy;
      drawCanvas();
    }
  });

  window.addEventListener('mouseup', e => {
    if (!isDragging) return;
    const wasDrag = hasDragged;
    isDragging = false;
    canvas.style.cursor = hoveredAgent ? 'crosshair' : 'grab';

    // Treat as a click if mouse barely moved
    if (!wasDrag) {
      const rect = canvas.getBoundingClientRect();
      const sx = e.clientX - rect.left;
      const sy = e.clientY - rect.top;
      // Only act if the mouseup is inside the canvas
      if (sx >= 0 && sy >= 0 && sx <= rect.width && sy <= rect.height) {
        const clicked = agentAtScreen(sx, sy, 20);
        selectedAgent = (clicked && selectedAgent && selectedAgent.id === clicked.id) ? null : clicked;
        renderAgentDetail();
        renderAgentList();
        drawCanvas();
      }
    }
  });

  // ── Mouse: zoom (wheel) ───────────────────────────────────────
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const rect   = canvas.getBoundingClientRect();
    const cx     = e.clientX - rect.left;
    const cy     = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    zoomAround(factor, cx, cy);
  }, { passive: false });

  // ── Touch: pinch-zoom + pan ───────────────────────────────────
  let touches = {};
  let lastPinchDist = null;

  let touchMoved = false;
  let tapStart   = { x: 0, y: 0 };

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) touches[t.identifier] = { x: t.clientX, y: t.clientY };
    if (Object.keys(touches).length === 1) {
      const [t] = Object.values(touches);
      isDragging = true;
      touchMoved = false;
      dragStart  = { x: t.x, y: t.y };
      tapStart   = { x: t.x, y: t.y };
      viewAtDrag = { x: view.x, y: view.y };
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) touches[t.identifier] = { x: t.clientX, y: t.clientY };
    const pts = Object.values(touches);
    if (pts.length === 2) {
      isDragging = false;
      touchMoved = true;
      const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
      if (lastPinchDist !== null) {
        const cx = (pts[0].x + pts[1].x) / 2 - canvas.getBoundingClientRect().left;
        const cy = (pts[0].y + pts[1].y) / 2 - canvas.getBoundingClientRect().top;
        zoomAround(dist / lastPinchDist, cx, cy);
      }
      lastPinchDist = dist;
    } else if (pts.length === 1 && isDragging) {
      const dx = pts[0].x - dragStart.x;
      const dy = pts[0].y - dragStart.y;
      if (Math.hypot(dx, dy) > 8) touchMoved = true;
      view.x = viewAtDrag.x + dx;
      view.y = viewAtDrag.y + dy;
      drawCanvas();
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    const wasSingleTap = Object.keys(touches).length === 1 && !touchMoved;
    const endTouch = e.changedTouches[0];

    for (const t of e.changedTouches) delete touches[t.identifier];
    if (Object.keys(touches).length < 2) lastPinchDist = null;
    if (Object.keys(touches).length === 0) isDragging = false;

    // Tap = single finger, barely moved → select agent
    if (wasSingleTap && endTouch) {
      const rect = canvas.getBoundingClientRect();
      const sx = endTouch.clientX - rect.left;
      const sy = endTouch.clientY - rect.top;
      const tapped = agentAtScreen(sx, sy, 28);
      selectedAgent = (tapped && selectedAgent && selectedAgent.id === tapped.id) ? null : tapped;
      renderAgentDetail();
      renderAgentList();
      drawCanvas();
    }
  });

  // ── Zoom control buttons ──────────────────────────────────────
  document.getElementById('btn-zoom-in').onclick    = () => zoomBy(1.4);
  document.getElementById('btn-zoom-out').onclick   = () => zoomBy(1 / 1.4);
  document.getElementById('btn-zoom-reset').onclick = resetView;

  // Fade out hint after 4 s
  setTimeout(() => {
    const h = document.getElementById('map-hint');
    h.style.opacity = '0';
    setTimeout(() => h.remove(), 1000);
  }, 4000);

  // ── Fetch helpers ─────────────────────────────────────────────
  async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + path, opts);
    if (!res.ok) throw new Error(await res.text());
    if (res.status === 204) return null;
    return res.json();
  }

  async function fetchAgents() {
    agents = await api('GET', '/agents/');
    renderAgentList();
    renderAgentDetail();
    drawCanvas();
    const alive = agents.filter(a => a.is_alive).length;
    document.getElementById('agent-count').textContent = alive;
  }

  async function fetchStatus() {
    simStatus = await api('GET', '/simulation/status');
    document.getElementById('tick-num').textContent = simStatus.current_tick;
    document.getElementById('interval-input').value = simStatus.tick_interval_seconds;
    const running = simStatus.is_running;
    document.getElementById('status-dot').className  = 'dot' + (running ? ' running' : '');
    document.getElementById('status-text').textContent = running ? 'Running' : 'Stopped';
    document.getElementById('btn-start').disabled = running;
    document.getElementById('btn-stop').disabled  = !running;
  }

  async function fetchEvents() {
    const events = await api('GET', '/world/events?active_only=true');
    renderActiveEvents(events);
  }

  async function fetchPredefined() {
    predefined = await api('GET', '/world/events/predefined');
    renderPredefinedEvents();
  }

  async function refresh() {
    await Promise.all([fetchAgents(), fetchStatus(), fetchEvents()]);
  }

  // ── Renders ───────────────────────────────────────────────────
  function renderAgentList() {
    const el = document.getElementById('agent-list');
    if (!agents.length) {
      el.innerHTML = '<div class="empty">No agents spawned yet</div>';
      return;
    }
    const sorted = [...agents].sort((a, b) => b.is_alive - a.is_alive || b.energy - a.energy);
    el.innerHTML = sorted.map(a => {
      const pct   = a.energy.toFixed(0);
      const eCol  = energyColor(a.energy, a.is_alive);
      const aCol  = agentColor(a.id, a.is_alive);
      const inv   = Object.entries(a.inventory || {}).map(([k,v]) => `${k}:${v}`).join(' ') || '—';
      const sel   = selectedAgent && selectedAgent.id === a.id;
      return `
        <div class="agent-item ${a.is_alive ? '' : 'dead'}" onclick="selectAgentById('${a.id}')"
             style="cursor:pointer;${sel ? 'border-color:var(--accent);' : ''}">
          <div class="agent-header">
            <div class="agent-name-wrap">
              <span class="agent-dot" style="background:${aCol}"></span>
              <span class="agent-name">${a.name}</span>
            </div>
            <span class="badge ${a.is_alive ? 'badge-alive' : 'badge-dead'}">${a.is_alive ? 'alive' : 'dead'}</span>
          </div>
          <div class="energy-bar">
            <div class="energy-fill" style="width:${pct}%;background:${eCol}"></div>
          </div>
          <div class="agent-meta">
            <span>⚡ ${a.energy.toFixed(1)}</span>
            <span>📍 ${a.x},${a.y}</span>
            <span>🎒 ${inv}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function renderActiveEvents(events) {
    const el = document.getElementById('active-events');
    if (!events.length) {
      el.innerHTML = '<div class="empty">No active events</div>';
      return;
    }
    el.innerHTML = events.map(e => `
      <span class="event-chip">
        ${e.name || e.event_type}
        <button class="remove" onclick="deactivateEvent('${e.id}')" title="Remove">×</button>
      </span>
    `).join('');
  }

  function renderPredefinedEvents() {
    const el = document.getElementById('predefined-events');
    el.innerHTML = Object.keys(predefined).map(key => `
      <button class="predefined-btn" onclick="activateEvent('${key}')">${key}</button>
    `).join('');
  }

  // ── Select agent & center map ────────────────────────────────
  function selectAgentById(id) {
    const a = agents.find(x => x.id === id);
    if (!a) return;
    selectedAgent = (selectedAgent && selectedAgent.id === id) ? null : a;
    if (selectedAgent) {
      // Pan canvas so agent is centered
      const worldPx = a.x * CELL + CELL / 2;
      const worldPy = a.y * CELL + CELL / 2;
      view.x = canvasW / 2 - worldPx * view.scale;
      view.y = canvasH / 2 - worldPy * view.scale;
    }
    renderAgentDetail();
    renderAgentList();
    drawCanvas();
  }

  // ── Agent detail panel ────────────────────────────────────────
  function renderAgentDetail() {
    const wrap = document.getElementById('agent-detail-wrap');
    const el   = document.getElementById('agent-detail');

    if (!selectedAgent) {
      wrap.style.display = 'none';
      el.innerHTML = '';
      return;
    }

    // Refresh from latest agents array
    const a   = agents.find(x => x.id === selectedAgent.id) || selectedAgent;
    const col = agentColor(a.id, a.is_alive);
    const eCol = energyColor(a.energy, a.is_alive);
    const mood  = a.internal_state?.mood  || '—';
    const goal  = a.internal_state?.goal  || '—';
    const trust = a.internal_state?.trust_level != null ? a.internal_state.trust_level : '—';
    const inv   = Object.entries(a.inventory || {}).map(([k,v]) => `${k}: ${v}`).join(', ') || 'empty';

    wrap.style.display = 'block';
    el.innerHTML = `
      <div class="d-name" style="color:${col}">${a.name}
        <span class="badge ${a.is_alive ? 'badge-alive' : 'badge-dead'}" style="margin-left:6px">${a.is_alive ? 'alive' : 'dead'}</span>
      </div>
      <div class="energy-bar" style="margin-bottom:7px">
        <div class="energy-fill" style="width:${a.energy.toFixed(0)}%;background:${eCol}"></div>
      </div>
      <div class="d-row"><span>⚡ Energy</span><span>${a.energy.toFixed(1)} / 100</span></div>
      <div class="d-row"><span>📍 Position</span><span>(${a.x}, ${a.y})</span></div>
      <div class="d-row"><span>🎂 Age</span><span>${a.age ?? '—'}</span></div>
      <div class="d-row"><span>⚧ Gender</span><span>${a.gender ?? '—'}</span></div>
      <div class="d-row"><span>😐 Mood</span><span>${mood}</span></div>
      <div class="d-row"><span>🎯 Goal</span><span>${goal}</span></div>
      <div class="d-row"><span>🤝 Trust</span><span>${trust}</span></div>
      <div class="d-row"><span>🎒 Inventory</span><span>${inv}</span></div>
      ${a.personality_prompt ? `<div class="d-desc">${escHtml(a.personality_prompt)}</div>` : ''}
    `;
  }

  // ── Activity log ──────────────────────────────────────────────
  function appendLog(text) {
    const log = document.getElementById('log');
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = text
      .split('\n')
      .map(line => line.startsWith('Tick ')
        ? `<span class="log-tick">${escHtml(line)}</span>`
        : escHtml(line))
      .join('<br>');
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    while (log.children.length > 50) log.removeChild(log.firstChild);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── WebSocket ─────────────────────────────────────────────────
  function connectWS() {
    const ws = new WebSocket(WS_URL);
    ws.onopen    = () => console.log('WS connected');
    ws.onmessage = e => { appendLog(e.data); refresh(); };
    ws.onclose   = () => { console.log('WS closed, reconnecting…'); setTimeout(connectWS, 3000); };
    ws.onerror   = () => ws.close();
  }

  // ── Button handlers ───────────────────────────────────────────
  document.getElementById('btn-start').onclick = async () => {
    const interval = parseInt(document.getElementById('interval-input').value) || 30;
    try {
      await api('POST', `/simulation/start?interval_seconds=${interval}`);
      await fetchStatus();
    } catch(e) { console.error('Start failed:', e); }
  };

  document.getElementById('btn-stop').onclick = async () => {
    try {
      await api('POST', '/simulation/stop');
      await fetchStatus();
    } catch(e) { console.error('Stop failed:', e); }
  };

  document.getElementById('btn-tick').onclick = async () => {
    document.getElementById('btn-tick').disabled = true;
    try {
      const res  = await fetch(API + '/simulation/tick', { method: 'POST' });
      const text = await res.text();
      appendLog(text);
      await refresh();
    } finally {
      document.getElementById('btn-tick').disabled = false;
    }
  };

  document.getElementById('btn-create').onclick = async () => {
    const btn    = document.getElementById('btn-create');
    const status = document.getElementById('spawn-status');
    const name   = document.getElementById('new-name').value.trim();

    if (!name) {
      status.style.color = 'var(--red)';
      status.textContent = 'Name is required.';
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Spawning…';
    status.textContent = '';

    const body = {
      name,
      age:               parseInt(document.getElementById('new-age').value) || 25,
      gender:            document.getElementById('new-gender').value,
      personality_prompt: document.getElementById('new-personality').value.trim(),
    };

    try {
      await api('POST', '/agents/', body);
      document.getElementById('new-name').value        = '';
      document.getElementById('new-personality').value = '';
      status.style.color = 'var(--green)';
      status.textContent = `✓ ${name} spawned!`;
      await fetchAgents();
    } catch(e) {
      console.error('Spawn failed:', e);
      status.style.color = 'var(--red)';
      status.textContent = 'Error: ' + e.message;
    } finally {
      btn.disabled    = false;
      btn.textContent = '+ Spawn';
    }
  };

  async function activateEvent(type) {
    await api('POST', '/world/events', { event_type: type });
    await fetchEvents();
  }

  async function deactivateEvent(id) {
    await api('DELETE', `/world/events/${id}`);
    await fetchEvents();
  }

  // ── Init ──────────────────────────────────────────────────────
  (async () => {
    syncCanvasSize();        // size canvas before first draw
    updateZoomDisplay();
    await refresh();
    await fetchPredefined();
    connectWS();
  })();
</script>
</body>
</html>
